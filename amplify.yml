version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        # Ensure artifact directory exists and provide required server files for Amplify checks.
        - ls -l .next || true
        - if [ ! -f .next/required-server-files.json ]; then echo "required-server-files.json missing" && exit 1; fi
        # Copy to repo root in case Amplify validates at the root of the artifact.
        - cp .next/required-server-files.json ./required-server-files.json
        - cp .next/trace ./trace || true
        - mkdir -p out
        - cp .next/required-server-files.json out/
        # Copy full .next to artifact so trace and server manifests are present under out/.next/
        - rm -rf out/.next || true
        - cp -r .next out/.next
        # Also place trace at artifact root locations Amplify may inspect.
        - cp .next/trace out/trace || true
        - mkdir -p out/server
        - cp .next/trace out/server/trace || true
        # Provide extra copies where Amplify may check (standalone-style locations).
        - mkdir -p out/standalone/.next out/standalone/server
        - cp .next/required-server-files.json out/standalone/.next/required-server-files.json || true
        - cp .next/trace out/standalone/trace || true
        - cp .next/trace out/standalone/server/trace || true
        - ls -l out || true
        - find out -maxdepth 4 -type f -name "trace" -o -name "required-server-files.json"
  artifacts:
    # Package artifacts from repo root so hidden .next folders under out are included.
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

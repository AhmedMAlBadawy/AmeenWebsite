# Static export to `out/`. WEB_COMPUTE expects manifests under `out/`. We mirror `.next` to
# `out/.next` and duplicate trace paths some deploy checks use. Artifact `**/*` can skip dot
# dirs on pack; we also list `.next/**/*` so `out/.next` is always included.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - echo Verifying static export under out/
        - 'test -f out/index.html || (echo "Missing out/index.html" && exit 1)'
        - 'test -d out/_next || (echo "Missing out/_next" && exit 1)'
        - rm -rf out/.next
        - cp -r .next out/.next
        - 'test -f out/.next/trace || (echo "Missing out/.next/trace" && exit 1)'
        - 'test -f out/.next/required-server-files.json || (echo "Missing out/.next/required-server-files.json" && exit 1)'
        - cp .next/required-server-files.json out/required-server-files.json
        - cp .next/trace out/trace
        - mkdir -p out/server
        - cp .next/trace out/server/trace
        - mkdir -p out/standalone/.next out/standalone/server
        - cp .next/required-server-files.json out/standalone/.next/required-server-files.json
        - cp .next/trace out/standalone/trace
        - cp .next/trace out/standalone/server/trace
        - 'test -f out/required-server-files.json || (echo "Missing out/required-server-files.json" && exit 1)'
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
      - ".next/**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

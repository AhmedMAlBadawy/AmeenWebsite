# Next.js static export: artifacts are under `out/`. For WEB_COMPUTE, we mirror `.next` into
# `out/.next` so deploy validation finds trace files. Prefer `aws amplify update-app --platform WEB`.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - echo Verifying static export under out/
        - 'test -f out/index.html || (echo "Missing out/index.html" && exit 1)'
        - 'test -d out/_next || (echo "Missing out/_next" && exit 1)'
        - rm -rf out/.next
        - cp -r .next out/.next
        - 'test -f out/.next/trace || (echo "Missing out/.next/trace" && exit 1)'
        - 'test -f out/.next/required-server-files.json || (echo "Missing out/.next/required-server-files.json" && exit 1)'
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

# WEB_COMPUTE needs a real Next `.next` tree (trace, manifests, server pages). Artifact is
# repo root with `.next`, `public`, lockfile, plus `out/` for static export HTML and copies of
# `trace` + `required-server-files.json` under `out/` when Amplify only scans that folder.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - echo Verifying Next build output for Amplify compute
        - 'test -f .next/required-server-files.json || (echo "Missing .next/required-server-files.json" && exit 1)'
        - 'test -f .next/trace || (echo "Missing .next/trace" && exit 1)'
        - 'test -d .next/static || (echo "Missing .next/static" && exit 1)'
        - 'test -f .next/server/pages/index.html || (echo "Missing .next/server/pages/index.html" && exit 1)'
        - 'test -f out/index.html || (echo "Missing out/index.html" && exit 1)'
        - cp .next/required-server-files.json required-server-files.json
        - cp .next/trace trace
        - cp .next/trace out/trace
        - cp .next/required-server-files.json out/required-server-files.json
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - "package.json"
      - "yarn.lock"
      - "next.config.js"
      - "required-server-files.json"
      - "trace"
      - "out/**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

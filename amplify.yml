# Artifact root must include manifests + server trace outputs Amplify scans at repo root
# (path .../src/AmeenWebsite): required-server-files.json, trace, next-server*.nft.json.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - 'test -d .next/server || (echo "Missing .next/server" && exit 1)'
        - 'test -f .next/required-server-files.json || (echo "Missing .next/required-server-files.json" && exit 1)'
        - 'test -f .next/trace || (echo "Missing .next/trace" && exit 1)'
        - 'test -f .next/next-server.js.nft.json || (echo "Missing .next/next-server.js.nft.json" && exit 1)'
        - 'test -f .next/next-minimal-server.js.nft.json || (echo "Missing .next/next-minimal-server.js.nft.json" && exit 1)'
        - cp .next/required-server-files.json required-server-files.json
        - cp .next/trace trace
        - cp .next/next-server.js.nft.json next-server.js.nft.json
        - cp .next/next-minimal-server.js.nft.json next-minimal-server.js.nft.json
        - 'test -f required-server-files.json -a -f trace -a -f next-server.js.nft.json -a -f next-minimal-server.js.nft.json || (echo "Missing root Amplify trace files" && exit 1)'
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - "package.json"
      - "yarn.lock"
      - "next.config.js"
      - "required-server-files.json"
      - "trace"
      - "next-server.js.nft.json"
      - "next-minimal-server.js.nft.json"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

# Stage deploy files under .amplify-deploy/ and set artifacts baseDirectory there.
# Using baseDirectory: . makes Amplify copy the whole repo into
# .../AmeenWebsite/amplify-compute-bundle-output/... which is inside the source tree
# ("Cannot copy ... to a subdirectory of itself").

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - 'test -d .next/server || (echo "Missing .next/server" && exit 1)'
        - 'test -f .next/required-server-files.json || (echo "Missing .next/required-server-files.json" && exit 1)'
        - 'test -e .next/trace || (echo "Missing .next/trace" && exit 1)'
        - 'test -f .next/next-server.js.nft.json || (echo "Missing .next/next-server.js.nft.json" && exit 1)'
        - 'test -f .next/next-minimal-server.js.nft.json || (echo "Missing .next/next-minimal-server.js.nft.json" && exit 1)'
        - rm -rf .amplify-deploy
        - mkdir -p .amplify-deploy
        - cp -a .next package.json yarn.lock next.config.js .amplify-deploy/
        - if [ -d public ]; then cp -a public .amplify-deploy/; fi
        - cp .next/required-server-files.json .amplify-deploy/required-server-files.json
        - cp -a .next/trace .amplify-deploy/trace
        - cp .next/next-server.js.nft.json .amplify-deploy/next-server.js.nft.json
        - cp .next/next-minimal-server.js.nft.json .amplify-deploy/next-minimal-server.js.nft.json
        - 'test -f .amplify-deploy/required-server-files.json -a -e .amplify-deploy/trace -a -f .amplify-deploy/next-server.js.nft.json -a -f .amplify-deploy/next-minimal-server.js.nft.json || (echo "Missing staged Amplify trace files" && exit 1)'
        - ls -la .amplify-deploy
  artifacts:
    baseDirectory: .amplify-deploy
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

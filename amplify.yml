# Next standalone output: deploy `.next/standalone` (traced server + minimal node_modules).
# After `next build`, copy static assets Next expects next to the standalone tree.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - 'test -f .next/standalone/server.js || (echo "Missing standalone server.js" && exit 1)'
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
        - 'test -f .next/standalone/.next/required-server-files.json || (echo "Missing standalone required-server-files.json" && exit 1)'
  artifacts:
    baseDirectory: .next/standalone
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

# Static export (`output: "export"` in next.config.js) — publish `out/` only.
#
# If the app is stuck on WEB_COMPUTE (Next SSR) and the console will not switch to static
# hosting, AWS often requires the CLI after a prior SSR migration (revert is not in UI).
# Replace APP_ID and REGION (app id is in Amplify URL or App settings → General).
#
#   aws amplify update-app --app-id APP_ID --platform WEB --region REGION
#
# Then redeploy. Valid platform values include WEB (static) and WEB_COMPUTE (SSR).
#
# Until you run that, this file copies `required-server-files.json` and `trace` from
# `.next` into `out` so the WEB_COMPUTE deploy validator finds them under baseDirectory.
# Build settings in the console should match this file (no duplicate pasted YAML).

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - echo "Verifying static export under out/"
        # Whole lines must be quoted so ":" in echo text is not parsed as YAML mapping.
        - 'test -f out/index.html || (echo "Missing out/index.html" && exit 1)'
        - 'test -d out/_next || (echo "Missing out/_next" && exit 1)'
        # If the Amplify app is still WEB_COMPUTE, deploy looks under baseDirectory (out) for
        # Next SSR manifests. Static export leaves them in .next only; copy so deploy passes.
        # Prefer App settings → static WEB hosting so this is unnecessary.
        - 'test -f .next/required-server-files.json && cp .next/required-server-files.json out/required-server-files.json'
        - 'test -f .next/trace && cp .next/trace out/trace'
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

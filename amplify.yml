# Static export (`output: "export"` in next.config.js) — only `out/` is published.
#
# Amplify Console (required):
# - App settings → General → Hosting: use static "WEB", NOT "WEB_COMPUTE" / Next.js SSR.
# - Build settings: use this file from the repo. If you pasted a custom build spec in
#   the console, remove it or keep it identical to below — console overrides can ignore
#   this file and bring back the broken "trace / required-server-files" workaround.
#
# SSR mode causes: "Server trace files are not found ... check your build artifacts path"

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - echo "Verifying static export under out/"
        # Whole lines must be quoted so ":" in echo text is not parsed as YAML mapping.
        - 'test -f out/index.html || (echo "Missing out/index.html" && exit 1)'
        - 'test -d out/_next || (echo "Missing out/_next" && exit 1)'
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

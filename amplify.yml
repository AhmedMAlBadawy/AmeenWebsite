# - baseDirectory "." + ".next/**/*" keeps compute/default/.next/server in the bundle.
# - Deploy also looks for required-server-files.json at the *artifact root*; Next only
#   writes it under .next/, so copy it to the repo root after build.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - 'test -d .next/server || (echo "Missing .next/server" && exit 1)'
        - 'test -f .next/required-server-files.json || (echo "Missing .next/required-server-files.json" && exit 1)'
        - cp .next/required-server-files.json required-server-files.json
        - 'test -f .next/trace && cp .next/trace trace || true'
        - 'test -f required-server-files.json || (echo "Missing root required-server-files.json" && exit 1)'
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - "package.json"
      - "yarn.lock"
      - "next.config.js"
      - "required-server-files.json"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

# Amplify compute bundles into amplify-compute-bundle-output/compute/default/ and expects
# .next/server under that path. Using baseDirectory ".next" strips the ".next" segment from
# the zip (server/ ends up at bundle root). Use baseDirectory "." and include ".next/**/*"
# so paths stay compute/default/.next/server (see AWS Next.js SSR hosting docs).

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - 'test -d .next/server || (echo "Missing .next/server" && exit 1)'
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - "package.json"
      - "yarn.lock"
      - "next.config.js"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

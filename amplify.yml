# Next standalone: artifact is `.next/standalone`. Amplify also expects
# `required-server-files.json` (and often `trace`) at the *root* of that folder, not only
# under `.next/standalone/.next/`.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
        - 'test -f .next/standalone/server.js || (echo "Missing standalone server.js" && exit 1)'
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
        - 'test -f .next/standalone/.next/required-server-files.json || (echo "Missing standalone required-server-files.json" && exit 1)'
        - 'test -f .next/trace || (echo "Missing .next/trace" && exit 1)'
        - cp .next/standalone/.next/required-server-files.json .next/standalone/required-server-files.json
        - cp .next/trace .next/standalone/trace
        - 'test -f .next/standalone/required-server-files.json || (echo "Missing root standalone required-server-files.json" && exit 1)'
  artifacts:
    baseDirectory: .next/standalone
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

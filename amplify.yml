# Static export (`output: "export"` in next.config.js) — deploy the `out` folder only.
#
# In Amplify Console: Hosting must use platform "WEB" (static), not "WEB_COMPUTE"
# / "Next.js - SSR". SSR mode expects `.next` trace files and will fail with:
# "Server trace files are not found ... please check your build artifacts path"
#
# If the app is still on WEB_COMPUTE: Amplify Console → App settings → General
# → Edit → Platform → Hosting with manual deploys / static hosting (WEB).

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
